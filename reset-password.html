<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Your Password — HappyHabit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #FFFCF5;
    color: #3d2800;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(61,40,0,0.08);
    padding: 36px 28px;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .star { font-size: 48px; margin-bottom: 8px; }
  h1 { font-size: 22px; margin-bottom: 8px; }
  p.subtitle { font-size: 14px; color: #6b6358; margin-bottom: 24px; line-height: 1.5; }
  label {
    display: block;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    color: #888;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input {
    width: 100%;
    padding: 14px;
    border: 1.5px solid #CECBF6;
    border-radius: 12px;
    font-size: 14px;
    background: #f8f6ff;
    color: #3d2800;
  }
  button {
    width: 100%;
    background: #FAC775;
    border: none;
    border-radius: 20px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    color: #3d2800;
    margin-top: 24px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  .message {
    border-radius: 10px;
    padding: 12px;
    margin-top: 16px;
    font-size: 13px;
    font-weight: 600;
    display: none;
  }
  .message.error { background: #FFE0DC; color: #993C1D; display: block; }
  .message.success { background: #97C45920; color: #3B6D11; display: block; }
</style>
</head>
<body>

  <div class="card">
    <div class="star">⭐</div>
    <h1 id="title">Reset Your Password</h1>
    <p class="subtitle" id="subtitle">Enter a new password for your HappyHabit account.</p>

    <div id="form-section">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="At least 6 characters" />

      <label>Confirm New Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter new password" />

      <button id="submitBtn" onclick="handleReset()">Update Password</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://sitcujratynhebvrjbnw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpdGN1anJhdHluaGVidnJqYm53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NTM3NDUsImV4cCI6MjA5NTIyOTc0NX0.4evHyNTO4QoE2YJvQqyoBWEZ0PTjJO7uoPT9kzLvlEo';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const messageEl = document.getElementById('message');
    const formSection = document.getElementById('form-section');
    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = 'message ' + type;
    }

    // Supabase puts the access_token in the URL hash fragment after the recovery link redirects here.
    // The supabase-js client automatically detects and uses this on page load when detectSessionInUrl is enabled (default true).
    window.addEventListener('load', async () => {
      const hash = window.location.hash;
      if (!hash || !hash.includes('access_token')) {
        formSection.style.display = 'none';
        titleEl.textContent = 'Invalid or Expired Link';
        subtitleEl.textContent = 'This password reset link is invalid or has expired. Please request a new one from the app.';
        return;
      }
      // supabase-js auto-parses the hash and sets the session; give it a brief moment
      setTimeout(async () => {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error || !data.session) {
          formSection.style.display = 'none';
          titleEl.textContent = 'Invalid or Expired Link';
          subtitleEl.textContent = 'This password reset link is invalid or has expired. Please request a new one from the app.';
        }
      }, 500);
    });

    async function handleReset() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = document.getElementById('submitBtn');

      if (newPassword.length < 6) {
        showMessage('Password must be at least 6 characters.', 'error');
        return;
      }
      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

      if (error) {
        showMessage('Failed to update password: ' + error.message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
        return;
      }

      formSection.style.display = 'none';
      titleEl.textContent = 'Password Updated! 🎉';
      subtitleEl.textContent = 'You can now go back to the HappyHabit app and log in with your new password.';
      showMessage('Your password has been changed successfully.', 'success');
    }
  </script>

</body>
</html>
